<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Viva Medical Informational system</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%23118f7a'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='Arial' font-size='11' font-weight='700' fill='white'%3EVM%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/shell.css">
    <link rel="stylesheet" href="./styles/components.css">
    <link rel="stylesheet" href="./styles/pages.css">
    <link rel="stylesheet" href="./styles/wizard.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="wordmark" aria-label="Viva Medical">
          <span class="wordmark-main">Viva Medical</span>
          <span class="wordmark-divider" aria-hidden="true"></span>
          <span class="wordmark-sub" data-i18n="app.serviceIs">Informational system</span>
        </div>
        <div class="user-pill" aria-label="Current user" data-i18n-aria="aria.currentUser">
          <span class="avatar">VM</span>
          <span id="active-role-label">Admin workspace</span>
        </div>
        <button class="language-toggle" type="button" data-language-toggle aria-pressed="false" aria-label="Switch language">LT</button>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">🌙 Dark mode</button>
      </header>

      <div class="app-body">
        <aside class="sidebar" aria-label="Main navigation" data-i18n-aria="aria.mainNavigation">
          <div class="sb-section">
            <button class="sb-item active" data-nav="service" id="sb-service">
              <span data-i18n="nav.service">Service</span>
            </button>
            <button class="sb-item" data-nav="workacts" id="sb-workacts">
              <span data-i18n="nav.workActs">Work Acts</span>
            </button>
            <button class="sb-item" data-nav="contracts" id="sb-contracts">
              <span data-i18n="nav.contracts">Contracts</span>
            </button>
            <button class="sb-item" data-nav="documents" id="sb-documents">
              <span data-i18n="nav.documents">Documents</span>
            </button>
            <button class="sb-item" data-nav="templates" id="sb-templates">
              <span data-i18n="nav.templates">Templates</span>
            </button>
          </div>

          <div class="sb-section">
            <div class="sb-label" data-i18n="nav.registry">Registry</div>
            <button class="sb-item" data-nav="customers" id="sb-customers">
              <span data-i18n="nav.customers">Customers</span>
            </button>
            <button class="sb-item" data-nav="equipment" id="sb-equipment">
              <span data-i18n="nav.equipment">Equipment</span>
            </button>
          </div>

          <div class="sb-section">
            <div class="sb-label" data-i18n="nav.control">Control</div>
            <button class="sb-item" data-nav="calendar" id="sb-calendar">
              <span data-i18n="nav.calendar">Calendar</span>
            </button>
            <button class="sb-item" data-nav="admin" id="sb-admin">
              <span data-i18n="nav.admin">Admin</span>
            </button>
          </div>

        </aside>

        <main class="main" id="app-main" tabindex="-1"></main>
      </div>
    </div>

    <div class="wiz-overlay" id="service-wizard" aria-hidden="true">
      <section class="wiz-dialog" role="dialog" aria-modal="true" aria-labelledby="wiz-title">
        <div class="wiz-head">
          <div>
            <h2 id="wiz-title">New service job</h2>
            <p id="wiz-subtitle">Step 1 of 8 - Customer</p>
          </div>
          <button class="wiz-close" type="button" id="wiz-close" aria-label="Close service wizard">x</button>
        </div>
        <div class="wiz-body">
          <div class="wiz-steps" id="wiz-steps" aria-label="Service workflow steps"></div>
          <div class="wiz-content" id="wiz-content"></div>
        </div>
        <div class="wiz-footer">
          <button class="btn ghost" type="button" id="wiz-back">Back</button>
          <div class="wiz-footer-right">
            <span id="wiz-count">1 / 8</span>
            <button class="btn dark" type="button" id="wiz-next">Continue</button>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
